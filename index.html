<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘의 메뉴 마스터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-4">
    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <section class="bg-white rounded-2xl shadow-md p-6 border">
            <h2 class="text-xl font-bold mb-4">🎯 1. 밸런스 게임 & 상황 추천</h2>
            <div id="game-box">
                <p id="question-text" class="text-lg mb-6">오늘 당기는 요리 스타일은?</p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="nextQuestion('A')" id="option-a" class="py-6 bg-slate-50 border rounded-xl">🍲 국물</button>
                    <button onclick="nextQuestion('B')" id="option-b" class="py-6 bg-slate-50 border rounded-xl">🍱 건조식</button>
                </div>
            </div>
            <div id="result-box" class="hidden text-center py-4">
                <div id="final-emoji" class="text-5xl mb-2">✨</div>
                <h3 id="final-name" class="text-2xl font-bold text-emerald-600">메뉴 이름</h3>
                <p id="final-desc" class="text-slate-600 my-2">설명</p>
                <button onclick="location.reload()" class="mt-4 text-xs underline">다시 하기</button>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-md p-6 border">
            <h2 class="text-xl font-bold mb-4">👻 2. 아무거나 랜덤 추천</h2>
            <div class="bg-indigo-50 p-6 text-center rounded-2xl">
                <div id="random-emoji" class="text-5xl mb-2">👻</div>
                <h3 id="random-name" class="text-2xl font-bold">버튼을 눌러보세요!</h3>
                <p id="random-desc" class="text-sm text-indigo-500 mt-2">상황 상관없이 랜덤!</p>
            </div>
            <button onclick="pickRandomMenu()" class="w-full py-4 mt-4 bg-indigo-600 text-white rounded-xl">아무거나 랜덤 추천! 👻</button>
        </section>
    </main>

    <script>
        const menuData = {
            group: [{name: "부대찌개", desc: "여럿이 끓여 먹는 국물 맛집!", emoji: "🥘"}, {name: "마라탕", desc: "단체 주문할 때 최고의 메뉴!", emoji: "🥢"}, {name: "파스타", desc: "다 같이 즐기는 양식!", emoji: "🍝"}],
            solo: [{name: "제육볶음", desc: "혼밥의 정석, 든든한 백반!", emoji: "🍛"}, {name: "돈까스", desc: "바삭하고 깔끔한 나만의 점심!", emoji: "🐷"}, {name: "치즈버거", desc: "빠르고 간편한 최고의 맛!", emoji: "🍔"}]
        };

        let currentStep = 1;
        let isSolo = false;

        function nextQuestion(choice) {
            if (currentStep === 3) {
                isSolo = (choice === 'B');
                showResult();
            } else {
                currentStep++;
                const qs = [
                    {text:"오늘 당기는 요리 스타일은?", a:"🍲 국물", b:"🍱 건조식"},
                    {text:"어떤 맛을 좋아하시나요?", a:"🔥 매콤한 맛", b:"🌿 담백한 맛"},
                    {text:"누구와 함께 식사하시나요?", a:"👥 여럿이서", b:"👤 혼자서"}
                ];
                document.getElementById('question-text').innerText = qs[currentStep-1].text;
                document.getElementById('option-a').innerText = qs[currentStep-1].a;
                document.getElementById('option-b').innerText = qs[currentStep-1].b;
            }
        }

        function showResult() {
            document.getElementById('game-box').classList.add('hidden');
            document.getElementById('result-box').classList.remove('hidden');
            const list = isSolo ? menuData.solo : menuData.group;
            const menu = list[Math.floor(Math.random() * list.length)]; // 랜덤성 보장
            document.getElementById('final-emoji').innerText = menu.emoji;
            document.getElementById('final-name').innerText = menu.name;
            document.getElementById('final-desc').innerText = menu.desc;
        }

        function pickRandomMenu() {
            const all = [...menuData.group, ...menuData.solo];
            const menu = all[Math.floor(Math.random() * all.length)]; // 랜덤성 보장
            document.getElementById('random-emoji').innerText = menu.emoji;
            document.getElementById('random-name').innerText = menu.name;
            document.getElementById('random-desc').innerText = menu.desc;
        }
    </script>
</body>
</html>
