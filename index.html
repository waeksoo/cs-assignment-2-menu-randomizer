<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 메뉴 마스터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <header class="bg-white shadow-sm border-b border-slate-200 py-6 text-center">
        <h1 class="text-3xl font-bold text-emerald-600 tracking-tight">🍽️ 오늘의 메뉴 마스터</h1>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        <section class="bg-white rounded-2xl shadow-md p-6 border border-slate-100 flex flex-col">
            <h2 class="text-xl font-bold text-slate-900 mb-4">🎯 1. 상황별 메뉴 결정</h2>
            <div id="game-box">
                <p id="question-text" class="text-lg font-medium text-slate-700 mb-6">누구와 함께 식사하시나요?</p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setMode('group')" class="py-8 bg-slate-50 border rounded-xl hover:bg-emerald-50">👥 여럿이서 (단체)</button>
                    <button onclick="setMode('solo')" class="py-8 bg-slate-50 border rounded-xl hover:bg-emerald-50">👤 혼자서 (혼밥)</button>
                </div>
            </div>
            <div id="result-box" class="hidden text-center py-4">
                <h3 id="result-title" class="text-2xl font-bold text-emerald-600"></h3>
                <p id="result-desc" class="text-slate-600 my-4"></p>
                <button onclick="pickFairyMenu()" class="w-full py-4 bg-emerald-600 text-white rounded-xl">요정님, 메뉴 추천해주세요!</button>
                <button onclick="location.reload()" class="mt-4 text-xs underline">다시 하기</button>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-md p-6 border border-slate-100 flex flex-col">
            <h2 class="text-xl font-bold text-slate-900 mb-4">👻 2. 랜덤 메뉴 뽑기 (상관없음)</h2>
            <div class="bg-indigo-50/50 p-8 my-auto text-center rounded-2xl">
                <div id="random-emoji" class="text-6xl mb-3">👻</div>
                <h3 id="random-menu-name" class="text-2xl font-bold">버튼을 눌러보세요!</h3>
                <p id="random-menu-desc" class="text-sm text-indigo-400 mt-2"></p>
            </div>
            <button onclick="pickRandomMenu()" class="w-full py-4 bg-indigo-600 text-white rounded-xl">아무거나 랜덤 추천! 👻</button>
        </section>
    </main>

    <script>
        // 전체 데이터
        const menuData = {
            group: [
                { name: "부대찌개", desc: "함께 끓여 먹는 얼큰한 국물 요리!", emoji: "🥘" },
                { name: "마라탕", desc: "각자 담아 나눠 먹기 좋은 최고의 메뉴!", emoji: "🥢" },
                { name: "짜장면&짬뽕", desc: "여럿이서 나누어 먹는 중식의 정석!", emoji: "🍜" }
            ],
            solo: [
                { name: "제육볶음 정식", desc: "혼자서도 든든하게 즐기는 한식 백반!", emoji: "🍛" },
                { name: "등심 돈까스", desc: "바삭하고 깔끔한 혼밥의 강자!", emoji: "🐷" },
                { name: "치즈 버거 세트", desc: "빠르고 간편하게 즐기는 최고의 맛!", emoji: "🍔" }
            ]
        };
        
        let currentMode = '';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('game-box').classList.add('hidden');
            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('result-title').innerText = mode === 'group' ? "파티 피플!" : "혼밥 마스터!";
            document.getElementById('result-desc').innerText = mode === 'group' ? "여럿이서 즐기기 좋은 메뉴를 준비했어요." : "혼자서도 야무지게 즐길 메뉴를 추천합니다.";
        }

        // 1. 상황 고려 추천
        function pickFairyMenu() {
            const list = menuData[currentMode];
            const menu = list[Math.floor(Math.random() * list.length)];
            document.getElementById('random-emoji').innerText = menu.emoji;
            document.getElementById('random-menu-name').innerText = menu.name;
            document.getElementById('random-menu-desc').innerText = "요정 추천: " + menu.desc;
        }

        // 2. 상황 상관없는 랜덤 추천
        function pickRandomMenu() {
            const allMenus = [...menuData.group, ...menuData.solo];
            const menu = allMenus[Math.floor(Math.random() * allMenus.length)];
            document.getElementById('random-emoji').innerText = menu.emoji;
            document.getElementById('random-menu-name').innerText = menu.name;
            document.getElementById('random-menu-desc').innerText = "요정의 기분 내키는 대로: " + menu.desc;
        }
    </script>
</body>
</html>
