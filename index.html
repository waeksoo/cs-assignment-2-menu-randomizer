<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 메뉴 마스터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <header class="bg-white shadow-sm border-b border-slate-200 py-6 text-center">
        <h1 class="text-3xl font-bold text-emerald-600 tracking-tight">🍽️ 오늘의 메뉴 마스터</h1>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        <section class="bg-white rounded-2xl shadow-md p-6 border border-slate-100">
            <h2 class="text-xl font-bold text-slate-900 mb-4">🎯 1. 밸런스 게임 & 상황 추천</h2>
            <div id="game-box">
                <p id="question-text" class="text-lg font-medium text-slate-700 mb-6">오늘 당기는 요리 스타일은?</p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="nextQuestion('A')" id="option-a" class="py-8 bg-slate-50 border rounded-xl hover:bg-emerald-50">🍲 국물 요리</button>
                    <button onclick="nextQuestion('B')" id="option-b" class="py-8 bg-slate-50 border rounded-xl hover:bg-emerald-50">🍱 건조식 요리</button>
                </div>
            </div>
            <div id="result-box" class="hidden text-center py-4">
                <h3 id="result-title" class="text-2xl font-bold text-emerald-600">결과 완료!</h3>
                <p id="result-desc" class="text-slate-600 my-4"></p>
                <button onclick="pickFairyMenu()" class="w-full py-4 bg-emerald-600 text-white rounded-xl">요정님, 상황별 메뉴 추천!</button>
                <button onclick="location.reload()" class="mt-4 text-xs underline">다시 테스트</button>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-md p-6 border border-slate-100">
            <h2 class="text-xl font-bold text-slate-900 mb-4">👻 2. 아무거나 랜덤 추천</h2>
            <div class="bg-indigo-50/50 p-8 my-6 text-center rounded-2xl">
                <div id="random-emoji" class="text-6xl mb-3">👻</div>
                <h3 id="random-menu-name" class="text-2xl font-bold">버튼을 눌러주세요!</h3>
                <p id="random-menu-desc" class="text-sm text-indigo-400 mt-2"></p>
            </div>
            <button onclick="pickRandomMenu()" class="w-full py-4 bg-indigo-600 text-white rounded-xl">아무거나 랜덤 추천! 👻</button>
        </section>
    </main>

    <script>
        const menuData = {
            group: [{name: "부대찌개", desc: "여럿이 모여 끓여 먹는 국물 맛집!", emoji: "🥘"}, {name: "마라탕", desc: "단체 주문할 때 최고의 인기 메뉴!", emoji: "🥢"}],
            solo: [{name: "제육볶음", desc: "혼밥의 정석, 든든한 한식 한 상!", emoji: "🍛"}, {name: "돈까스", desc: "바삭하고 깔끔한 나만의 점심!", emoji: "🐷"}]
        };

        let currentStep = 1;
        let isSolo = false;

        function nextQuestion(choice) {
            if (currentStep === 3) isSolo = (choice === 'B');
            if (currentStep < 3) {
                currentStep++;
                const qs = [
                    {text:"오늘 당기는 요리 스타일은?", a:"🍲 국물 요리", b:"🍱 건조식 요리"},
                    {text:"어떤 맛을 좋아하시나요?", a:"🔥 매콤한 맛", b:"🌿 담백한 맛"},
                    {text:"누구와 함께 식사하시나요?", a:"👥 여럿이서 (단체)", b:"👤 혼자서 (혼밥)"}
                ];
                document.getElementById('question-text').innerText = qs[currentStep-1].text;
                document.getElementById('option-a').innerText = qs[currentStep-1].a;
                document.getElementById('option-b').innerText = qs[currentStep-1].b;
            } else {
                document.getElementById('game-box').classList.add('hidden');
                document.getElementById('result-box').classList.remove('hidden');
                document.getElementById('result-desc').innerText = isSolo ? "혼밥 마스터님이시군요!" : "단체 식사 파티 피플이시군요!";
            }
        }

        function pickFairyMenu() {
            const list = isSolo ? menuData.solo : menuData.group;
            const menu = list[Math.floor(Math.random() * list.length)];
            alert(`요정의 추천: ${menu.name}\n${menu.desc}`);
        }

        function pickRandomMenu() {
            const all = [...menuData.group, ...menuData.solo];
            const menu = all[Math.floor(Math.random() * all.length)];
            document.getElementById('random-emoji').innerText = menu.emoji;
            document.getElementById('random-menu-name').innerText = menu.name;
            document.getElementById('random-menu-desc').innerText = menu.desc;
        }
    </script>
</body>
</html>
